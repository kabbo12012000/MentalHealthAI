services:
  - type: web
    name: mentalhealthai
    env: docker
    plan: starter
    autoDeploy: true
    envVars:
      - key: OLLAMA_MODEL
        value: qwen2.5:0.5b
      - key: OLLAMA_EMBED_MODEL
        value: all-minilm
      - key: ENABLE_RAG
        value: "false"
      - key: OLLAMA_BASE_URL
        value: http://localhost:11434
      - key: CHROMA_DB_PATH
        value: /app/db
      - key: MENTAL_HEALTH_DATA_PATH
        value: /app/data/mental_health_india.json
      - key: STREAMLIT_SERVER_PORT
        value: 8501
